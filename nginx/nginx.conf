server {
    listen 80;
    server_name 72.61.35.50; # IP da sua VPS

    # 1. Serve os arquivos estáticos do React (Vite)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # Essencial para o React Router funcionar
    }

    # 2. Redireciona tudo que for /auth para o container do Backend
    location /auth/ {
        proxy_pass http://api:8080/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # Se futuramente você criar rotas /api, adicione um bloco igual acima:
    # location /api/ { proxy_pass http://api:8080/api/; ... }
}