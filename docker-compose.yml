services:
  db:
    image: postgres:16-alpine
    container_name: ${DB_CONTAINER:-gestao-reunioes-db}
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - gestao-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${API_CONTAINER:-gestao-reunioes-api}
    restart: always
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - gestao-network
      - shared-proxy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${WEB_CONTAINER:-gestao-reunioes-web}
    restart: always
    depends_on:
      - api
    ports:
      - "3001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - gestao-network
      - shared-proxy

networks:
  gestao-network:
    driver: bridge
  shared-proxy:
    external: true

volumes:
  pgdata:
