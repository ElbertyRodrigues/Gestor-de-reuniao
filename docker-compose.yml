services:
  db:
    image: postgres:16-alpine
    container_name: gestaoufu-db
    restart: always
    environment:
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: ***REMOVED***
      POSTGRES_DB: gestao_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - gestaoufu-network

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestaoufu-api
    restart: always
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/gestao_db
      - SPRING_DATASOURCE_USERNAME=db_user
      - SPRING_DATASOURCE_PASSWORD=***REMOVED***
      - JWT_SECRET=***REMOVED***
    ports:
      - "8080:8080"
    networks:
      - gestaoufu-network

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gestaoufu-web
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      # Aqui injetamos o nosso nginx.conf para dentro do container
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - gestaoufu-network

networks:
  gestaoufu-network:
    driver: bridge

volumes:
  pgdata: